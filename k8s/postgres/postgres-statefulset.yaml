apiVersion: apps/v1
kind: StatefulSet
metadata: 
  name: postgres
  namespace: mattermost-cluster
spec: 
  serviceName: postgres
  replicas: 1
  selector: 
    matchLabels:
      app: postgres
  template: 
    metadata: 
      labels:
        app: postgres
    spec: 
      containers:
        - name: postgres
          image: postgres:15
          ports: 
            - containerPort: 5432
          envFrom: 
            - secretRef:
                name: postgres-secret
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
              subPath: postgres
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec: 
        accessModes: ["ReadWriteOnce"]
        storageClassName: gp2
        resources: 
          requests:
            storage: 10Gi